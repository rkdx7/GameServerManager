name: Release

# Builds the Windows (Qt 6 / MinGW) app, packages a versioned tarball and
# publishes it as a GitHub Release.
#
# Triggered by pushing a semver tag (e.g. `v1.0.0`), or manually from the
# Actions tab via the "Run workflow" button (workflow_dispatch).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without leading v, e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Install Qt 6.7.3 (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310'
          cache: true

      - name: Add MinGW to PATH
        shell: bash
        run: echo "$IQTA_TOOLS/mingw1310_64/bin" >> "$GITHUB_PATH"

      - name: Configure (CMake / MinGW Makefiles)
        shell: cmd
        run: >
          cmake -B build -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++

      - name: Build
        shell: cmd
        run: cmake --build build -j 4

      - name: Stage and deploy Qt runtime
        shell: cmd
        env:
          DIST: GameServerManager-${{ steps.version.outputs.version }}
        run: |
          mkdir dist\%DIST%
          copy build\app-qt.exe dist\%DIST%\
          windeployqt dist\%DIST%\app-qt.exe --no-translations --release

      - name: Package versioned tarball
        id: package
        shell: bash
        run: |
          DIST="GameServerManager-${{ steps.version.outputs.version }}"
          ARCHIVE="$DIST.tar.gz"
          tar -czf "$ARCHIVE" -C dist "$DIST"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}
