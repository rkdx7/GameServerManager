name: Release

# Builds a single self-contained Windows .exe (Qt DLLs + plugins embedded via a
# 7-Zip self-extracting module) and attaches it to the GitHub Release.
#
# Trigger: push a version tag, e.g.  git tag v1.0.2 && git push origin v1.0.2
# You can also run it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.7.3 (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310'
          cache: true

      - name: Add MinGW to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$env:IQTA_TOOLS\mingw1310_64\bin"

      - name: Configure (CMake / MinGW Makefiles)
        shell: cmd
        run: >
          cmake -B build -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MAKE_PROGRAM=mingw32-make.exe
          -DCMAKE_C_COMPILER=gcc.exe
          -DCMAKE_CXX_COMPILER=g++.exe
          -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%"

      - name: Build
        shell: cmd
        run: cmake --build build -j 4

      - name: Deploy Qt dependencies (windeployqt)
        shell: cmd
        run: |
          mkdir dist
          copy build\app-qt.exe dist\GameServerManager.exe
          windeployqt dist\GameServerManager.exe --release --no-translations --no-system-d3d-compiler --no-opengl-sw

      - name: Pack into a single self-extracting .exe
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\Program Files\7-Zip\7z.sfx')) { throw "7z.sfx module not found on runner" }

          # Archive everything windeployqt produced (exe + DLLs + plugins).
          & 'C:\Program Files\7-Zip\7z.exe' a -t7z -mx=9 app.7z .\dist\*
          if ($LASTEXITCODE -ne 0) { throw "7z archive failed" }

          # Concatenate: SFX module + run config + archive  ->  one .exe.
          # The SFX extracts to a temp dir at launch and starts app-qt.exe.
          cmd /c 'copy /b "C:\Program Files\7-Zip\7z.sfx" + packaging\sfx_config.txt + app.7z GameServerManager.exe'
          if (-not (Test-Path GameServerManager.exe)) { throw "SFX assembly failed" }

      - name: Upload artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: GameServerManager-portable
          path: GameServerManager.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GameServerManager.exe
          fail_on_unmatched_files: true
